name: kbi

# VM 한 대에 전부 올린다. 붙이는 순서: db → api → web → caddy.
#
# ⚠️ 포트를 공개하는 건 caddy뿐이다. db/api/web에 ports를 추가하지 말 것.
# 도커가 포트를 publish하면 iptables를 직접 건드려서 ufw 규칙을 **우회한다.**
# 방화벽을 막아 뒀으니 괜찮다고 생각하는 순간 Postgres가 인터넷에 열린다.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # ⚠️ 발급받은 인증서가 여기 들어 있다. 이 볼륨을 지우고 재시작을 반복하면
      # Let's Encrypt 발급 한도(주당 5회)에 걸려 한 주 동안 https가 안 뜬다.
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?.env에 SITE_DOMAIN을 설정하세요}
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      args:
        # 빌드 시점에 번들에 박히는 값이라 environment가 아니라 args다.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?.env에 NEXT_PUBLIC_SITE_URL을 설정하세요}
    restart: unless-stopped
    environment:
      # 서버 렌더 중에는 상대 경로를 못 쓴다. 브라우저는 이 값을 안 본다.
      API_INTERNAL_URL: http://api:8080
    depends_on:
      - api

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://kbi:${POSTGRES_PASSWORD:?.env에 POSTGRES_PASSWORD를 설정하세요}@db:5432/kbi
      ADMIN_TOKEN: ${ADMIN_TOKEN:?.env에 ADMIN_TOKEN을 설정하세요}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kbi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?.env에 POSTGRES_PASSWORD를 설정하세요}
      POSTGRES_DB: kbi
    volumes:
      - db_data:/var/lib/postgresql/data
    # api가 db보다 먼저 뜨면 첫 쿼리가 깨진다. depends_on만으로는 "컨테이너가
    # 시작됨"까지만 보장되지 "Postgres가 접속을 받는다"는 보장하지 않는다.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbi -d kbi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  db_data:
