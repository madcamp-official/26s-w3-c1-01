distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# 9.5.1은 이 컴퓨터 캐시에 이미 완전히 받아져 있다(Android Studio가 예전에 받아둔 것).
# 주소를 Android Studio가 쓰던 것과 동일하게 맞춰야 캐시 해시가 일치해서 재다운로드가 없다.
# 이 회선은 30MB 넘는 전송이 끊겨서 136MB짜리 Gradle을 받을 수 없다 — 그래서 이 선택이다.
#
# 팀원은 9.5.0을 쓰지만 패치 한 자리 차이라 그대로 간다. 9.5.0으로 맞추면
# 136MB를 새로 받아야 하는데 이 회선에서는 불가능하다.
distributionUrl=https\://services.gradle.org/distributions/gradle-9.5.1-bin.zip
networkTimeout=60000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
